version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
      - MONGO_URI=mongodb://mongodb:27017/mantis_ai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_access_token_key_change_me_in_production
      - JWT_REFRESH_SECRET=super_secret_refresh_token_key_change_me_in_production
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - CLOUDINARY_CLOUD_NAME=mock
      - CLOUDINARY_API_KEY=mock
      - CLOUDINARY_API_SECRET=mock
      - OPENAI_API_KEY=mock
    depends_on:
      - mongodb
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      api:
        condition: service_healthy
    restart: always

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

volumes:
  mongo-data:
  redis-data:
